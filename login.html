<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — CTF Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/all.min.css">
<style>
:root{
  --bg:#08090d;--bg2:#0e1018;--bg3:#131620;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --accent:#e84393;--accent2:#7c3aed;
  --tx:#f0f0f5;--dim:#5a5f7a;--dim2:#8890b0;
  --red:#ef4444;--green:#22c55e;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}

/* FIX: hide body until auth check completes — prevents layout flash */
body.auth-pending { visibility: hidden; }

/* Grid bg */
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;
}
/* Glow orbs */
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;opacity:.35;}
.orb1{width:500px;height:500px;background:radial-gradient(circle,#e84393,transparent 70%);top:-120px;right:-120px;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,#7c3aed,transparent 70%);bottom:-100px;left:-100px;}

.card{
  position:relative;z-index:2;
  width:420px;
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:18px;
  padding:36px 32px 32px;
  box-shadow:0 24px 64px rgba(0,0,0,.6);
}

/* Logo */
.logo{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.logo-mark{
  width:36px;height:36px;border-radius:9px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;color:#fff;flex-shrink:0;
}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;}
.logo-text span{color:var(--dim2);}
.subtitle{font-size:.82rem;color:var(--dim2);margin-bottom:28px;}

/* Tabs */
.tabs{display:flex;background:var(--bg3);border-radius:9px;padding:4px;margin-bottom:24px;}
.tab-btn{
  flex:1;padding:8px;border-radius:7px;border:none;
  background:transparent;color:var(--dim2);
  font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;
  cursor:pointer;transition:all .2s;
}
.tab-btn.active{background:var(--bg2);color:var(--tx);box-shadow:0 1px 4px rgba(0,0,0,.4);}

/* Form */
.field{margin-bottom:14px;}
.field label{display:block;font-size:.72rem;color:var(--dim2);font-weight:500;margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px;}
.inp{
  width:100%;padding:10px 14px;
  background:var(--bg3);border:1.5px solid var(--border);
  border-radius:9px;color:var(--tx);
  font-family:'DM Sans',sans-serif;font-size:.9rem;
  outline:none;transition:border-color .2s;
}
.inp:focus{border-color:var(--accent);}
.inp::placeholder{color:var(--dim);}

.btn-primary{
  width:100%;padding:11px;border:none;border-radius:9px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;
  cursor:pointer;transition:all .2s;margin-top:4px;
}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 8px 24px rgba(232,67,147,.35);}
.btn-primary:active{transform:translateY(0);}

.divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--dim);font-size:.75rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

.btn-google{
  width:100%;padding:10px;border:1.5px solid var(--border2);border-radius:9px;
  background:transparent;color:var(--tx);
  font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:500;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.btn-google:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.2);}
.google-icon{width:18px;height:18px;}

.error-box{
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);
  border-radius:8px;padding:10px 14px;
  font-size:.8rem;color:#fca5a5;margin-bottom:14px;display:none;
}
.error-box.show{display:block;}

#form-register{display:none;}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg);}}
.spin{animation:spin .7s linear infinite;}
</style>
</head>
<body class="auth-pending">
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card">
  <div class="logo">
    <div class="logo-mark"><i class="fas fa-flag"></i></div>
    <div class="logo-text">CTF<span>_Academy</span></div>
  </div>
  <p class="subtitle">Capture The Flag · Compete · Learn · Dominate</p>

  <div class="tabs">
    <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
    <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
  </div>

  <div id="error-box" class="error-box"></div>

  <!-- LOGIN -->
  <div id="form-login">
    <div class="field">
      <label>Email</label>
      <input class="inp" type="email" id="login-email" placeholder="hacker@academy.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input class="inp" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">
      <i class="fas fa-sign-in-alt"></i> Sign In
    </button>
    <div class="divider">or continue with</div>
    <button class="btn-google" onclick="doGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>
  </div>

  <!-- REGISTER -->
  <div id="form-register">
    <div class="field">
      <label>Display Name</label>
      <input class="inp" type="text" id="reg-name" placeholder="h4cker_pro" autocomplete="username">
    </div>
    <div class="field">
      <label>Email</label>
      <input class="inp" type="email" id="reg-email" placeholder="you@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input class="inp" type="password" id="reg-pass" placeholder="min 6 characters" autocomplete="new-password">
    </div>
    <button class="btn-primary" id="reg-btn" onclick="doRegister()">
      <i class="fas fa-user-plus"></i> Create Account
    </button>
    <div class="divider">or continue with</div>
    <button class="btn-google" onclick="doGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>
  </div>
</div>

<script type="module">
// FIX: correct path is ./js/firebase.js (not ./firebase.js)
import { auth, db } from "./js/firebase.js";
import {
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  signInWithPopup,
  GoogleAuthProvider,
  onAuthStateChanged,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  doc, getDoc, setDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const $id = id => document.getElementById(id);

// FIX: Remove auth-pending class only after onAuthStateChanged resolves.
// This prevents the login form from flashing before a redirect happens.
onAuthStateChanged(auth, user => {
  document.body.classList.remove("auth-pending");
  if (user) {
    window.location.href = "dashboard.html";
  }
});

function showError(msg) {
  const el = $id("error-box");
  el.textContent = msg;
  el.classList.add("show");
}
function clearError() { $id("error-box").classList.remove("show"); }

window.switchTab = function(tab) {
  $id("form-login").style.display    = tab === "login"    ? "block" : "none";
  $id("form-register").style.display = tab === "register" ? "block" : "none";
  $id("tab-login").classList.toggle("active",    tab === "login");
  $id("tab-register").classList.toggle("active", tab === "register");
  clearError();
};
// Show login by default
$id("form-login").style.display = "block";

async function ensureUserDoc(user, displayName) {
  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, {
      uid:       user.uid,
      name:      displayName || user.displayName || user.email.split("@")[0],
      email:     user.email,
      role:      "player",   // 'player' | 'admin'
      score:     0,
      solves:    0,
      rank:      0,
      solvedIds: [],
      createdAt: serverTimestamp()
    });
  }
}

window.doLogin = async function() {
  clearError();
  const email = $id("login-email").value.trim();
  const pass  = $id("login-pass").value;
  if (!email || !pass) return showError("Please fill in all fields.");
  const btn = $id("login-btn");
  btn.innerHTML = '<i class="fas fa-spinner spin"></i> Signing in…';
  btn.disabled = true;
  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    await ensureUserDoc(cred.user);
    window.location.href = "dashboard.html";
  } catch(e) {
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
    btn.disabled = false;
    showError(friendlyError(e.code));
  }
};

window.doRegister = async function() {
  clearError();
  const name  = $id("reg-name").value.trim();
  const email = $id("reg-email").value.trim();
  const pass  = $id("reg-pass").value;
  if (!name || !email || !pass) return showError("Please fill in all fields.");
  if (pass.length < 6) return showError("Password must be at least 6 characters.");
  const btn = $id("reg-btn");
  btn.innerHTML = '<i class="fas fa-spinner spin"></i> Creating…';
  btn.disabled = true;
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    await ensureUserDoc(cred.user, name);
    window.location.href = "dashboard.html";
  } catch(e) {
    btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
    btn.disabled = false;
    showError(friendlyError(e.code));
  }
};

window.doGoogle = async function() {
  clearError();
  try {
    const cred = await signInWithPopup(auth, new GoogleAuthProvider());
    await ensureUserDoc(cred.user);
    window.location.href = "dashboard.html";
  } catch(e) {
    showError(friendlyError(e.code));
  }
};

function friendlyError(code) {
  const map = {
    "auth/user-not-found":       "No account with that email.",
    "auth/wrong-password":       "Incorrect password.",
    "auth/invalid-credential":   "Invalid email or password.",
    "auth/email-already-in-use": "That email is already registered.",
    "auth/invalid-email":        "Invalid email address.",
    "auth/weak-password":        "Password too weak.",
    "auth/popup-closed-by-user": "Google sign-in was cancelled.",
    "auth/network-request-failed":"Network error. Check your connection.",
  };
  return map[code] || "Something went wrong. Try again.";
}

// Enter key support
document.addEventListener("keydown", e => {
  if (e.key !== "Enter") return;
  if ($id("form-login").style.display !== "none") doLogin();
  else doRegister();
});
</script>
</body>
</html>
