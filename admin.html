<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — CTF Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/all.min.css">
<style>
:root{
  --bg:#08090d;--bg2:#0e1018;--bg3:#131620;--bg4:#1a1e2e;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --accent:#e84393;--accent2:#7c3aed;
  --tx:#f0f0f5;--dim:#5a5f7a;--dim2:#8890b0;
  --red:#ef4444;--green:#22c55e;--amber:#f59e0b;
  --sidebar:240px;--topbar:56px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:52px 52px;pointer-events:none;}
.sidebar{width:var(--sidebar);min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sb-logo{padding:18px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;}
.logo-mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:.65rem;color:#fff;}
.admin-tag{font-size:.6rem;font-weight:800;background:rgba(232,67,147,.15);color:var(--accent);border:1px solid rgba(232,67,147,.25);padding:2px 6px;border-radius:4px;margin-left:auto;}
.sb-nav{flex:1;padding:10px 8px;}
.sb-nav a{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;font-size:.84rem;color:var(--dim2);text-decoration:none;transition:all .15s;cursor:pointer;margin-bottom:2px;border:1px solid transparent;}
.sb-nav a:hover{color:var(--tx);background:rgba(255,255,255,.04);}
.sb-nav a.active{color:var(--accent);background:rgba(232,67,147,.08);border-color:rgba(232,67,147,.15);}
.sb-nav a i{width:16px;text-align:center;font-size:.8rem;}
.sec-label{font-size:.63rem;text-transform:uppercase;letter-spacing:1px;color:var(--dim);padding:10px 10px 4px;font-weight:600;}
.sb-bottom{padding:10px 8px;border-top:1px solid var(--border);}
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{height:var(--topbar);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:12px;position:sticky;top:0;background:rgba(8,9,13,.9);z-index:20;backdrop-filter:blur(12px);}
.topbar-title{font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;}
.content{flex:1;padding:24px;overflow-y:auto;}
.view{display:none;}.view.active{display:block;}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;}
.stat-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.85rem;margin-bottom:8px;}
.stat-label{font-size:.72rem;color:var(--dim2);font-weight:500;}
.stat-value{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;}

/* Table */
.data-table{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px;}
.dt-row{display:grid;align-items:center;padding:12px 18px;border-bottom:1px solid var(--border);transition:background .12s;}
.dt-row:last-child{border-bottom:none;}
.dt-row:not(.dt-head):hover{background:var(--bg3);}
.dt-head{background:var(--bg3);font-size:.65rem;text-transform:uppercase;letter-spacing:.7px;color:var(--dim);font-weight:700;}

/* Form */
.form-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:22px;max-width:620px;margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:.68rem;color:var(--dim2);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px;}
.inp{width:100%;padding:10px 13px;background:var(--bg3);border:1.5px solid var(--border);border-radius:9px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--accent);}
.inp::placeholder{color:var(--dim);}
select.inp option{background:var(--bg3);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
textarea.inp{resize:vertical;min-height:80px;font-family:'DM Sans',sans-serif;}
.mono.inp{font-family:'DM Mono',monospace;font-size:.82rem;}

/* Buttons */
.btn{padding:9px 16px;border-radius:9px;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px;}
.btn-accent{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.btn-accent:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(232,67,147,.3);}
.btn-ghost{background:var(--bg3);border:1px solid var(--border);color:var(--dim2);}
.btn-ghost:hover{color:var(--tx);border-color:var(--border2);}
.btn-danger{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#fca5a5;}
.btn-danger:hover{background:rgba(239,68,68,.15);}
.btn-sm{padding:6px 12px;font-size:.74rem;}
.btn-green{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:#4ade80;}
.btn-green:hover{background:rgba(34,197,94,.18);}

/* Sec header */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sec-hd h2{font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;}

/* Badges */
.cat-badge{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.7px;padding:3px 8px;border-radius:5px;}
.diff-badge{font-size:.62rem;font-weight:800;padding:3px 8px;border-radius:5px;}
.diff-Easy{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.2);}
.diff-Medium{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.2);}
.diff-Hard{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2);}

/* Toast */
#toast-cont{position:fixed;bottom:22px;right:22px;z-index:999;display:flex;flex-direction:column;gap:7px;}
.toast{padding:10px 16px;border-radius:9px;font-size:.8rem;font-weight:600;color:#fff;animation:toastIn .25s ease;}
.toast.ok{background:rgba(34,197,94,.9);}
.toast.err{background:rgba(239,68,68,.9);}
.toast.info{background:rgba(232,67,147,.9);}
@keyframes toastIn{from{transform:translateX(50px);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px);}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:560px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;transform:scale(.97);transition:transform .2s;box-shadow:0 24px 80px rgba(0,0,0,.7);}
.modal-overlay.open .modal{transform:scale(1);}
.modal-hd{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;}
.modal-close{width:28px;height:28px;border-radius:7px;background:var(--bg3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--dim2);font-size:.75rem;}
.modal-body{padding:18px 20px 22px;overflow-y:auto;}

/* Empty */
.empty{text-align:center;padding:40px;color:var(--dim2);}
.empty i{font-size:1.8rem;margin-bottom:10px;display:block;color:var(--dim);}
@keyframes spin{to{transform:rotate(360deg);}}.spin{animation:spin .7s linear infinite;}

/* Pill */
.pill{display:inline-flex;align-items:center;gap:4px;font-size:.64rem;font-weight:700;padding:2px 8px;border-radius:4px;}
.pill-on{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.2);}
.pill-off{background:rgba(90,95,122,.12);color:var(--dim2);border:1px solid var(--border);}

@media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>

<div id="toast-cont"></div>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sb-logo">
    <div class="logo-mark"><i class="fas fa-shield-alt"></i></div>
    Admin<span class="admin-tag">PANEL</span>
  </div>
  <nav class="sb-nav">
    <p class="sec-label">Overview</p>
    <a class="active" id="nav-overview" onclick="go('overview')"><i class="fas fa-th-large"></i> Overview</a>
    <p class="sec-label">Manage</p>
    <a id="nav-challenges" onclick="go('challenges')"><i class="fas fa-layer-group"></i> Challenges</a>
    <a id="nav-users" onclick="go('users')"><i class="fas fa-users"></i> Users</a>
    <a id="nav-solves" onclick="go('solves')"><i class="fas fa-flag"></i> All Solves</a>
  </nav>
  <div class="sb-bottom">
    <a href="dashboard.html" style="display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;font-size:.82rem;color:var(--dim2);text-decoration:none;transition:color .15s;" onmouseover="this.style.color='var(--tx)'" onmouseout="this.style.color='var(--dim2)'">
      <i class="fas fa-arrow-left" style="width:16px;text-align:center;font-size:.78rem;"></i> Back to Dashboard
    </a>
    <a onclick="doLogout()" style="display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;font-size:.82rem;color:var(--dim2);cursor:pointer;transition:color .15s;margin-top:2px;" onmouseover="this.style.color='#fca5a5'" onmouseout="this.style.color='var(--dim2)'">
      <i class="fas fa-sign-out-alt" style="width:16px;text-align:center;font-size:.78rem;"></i> Sign Out
    </a>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <header class="topbar">
    <div class="topbar-title" id="page-title">Overview</div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:10px;">
      <span id="admin-name" style="font-size:.8rem;color:var(--dim2);"></span>
      <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:.78rem;" id="admin-av">A</div>
    </div>
  </header>

  <div class="content">

    <!-- OVERVIEW -->
    <div id="view-overview" class="view active">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(232,67,147,.1);color:var(--accent);"><i class="fas fa-layer-group"></i></div>
          <div class="stat-label">Total Challenges</div>
          <div class="stat-value" id="ov-chals">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(34,197,94,.1);color:var(--green);"><i class="fas fa-users"></i></div>
          <div class="stat-label">Total Players</div>
          <div class="stat-value" id="ov-players">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(124,58,237,.1);color:#a78bfa;"><i class="fas fa-flag"></i></div>
          <div class="stat-label">Total Solves</div>
          <div class="stat-value" id="ov-solves">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(245,158,11,.1);color:var(--amber);"><i class="fas fa-trophy"></i></div>
          <div class="stat-label">Top Score</div>
          <div class="stat-value" id="ov-top" style="font-family:'DM Mono',monospace;">—</div>
        </div>
      </div>
      <div class="sec-hd"><h2>Recent Activity</h2></div>
      <div class="data-table" id="ov-activity">
        <div class="empty"><i class="fas fa-spinner spin"></i></div>
      </div>
    </div>

    <!-- CHALLENGES -->
    <div id="view-challenges" class="view">
      <div class="sec-hd">
        <h2>Challenges</h2>
        <button class="btn btn-accent btn-sm" onclick="openAddChal()"><i class="fas fa-plus"></i> Add Challenge</button>
      </div>
      <div class="data-table" id="chal-table">
        <div class="empty"><i class="fas fa-spinner spin"></i></div>
      </div>
    </div>

    <!-- USERS -->
    <div id="view-users" class="view">
      <div class="sec-hd"><h2>Users</h2></div>
      <div class="data-table" id="users-table">
        <div class="empty"><i class="fas fa-spinner spin"></i></div>
      </div>
    </div>

    <!-- ALL SOLVES -->
    <div id="view-solves" class="view">
      <div class="sec-hd"><h2>All Solves</h2></div>
      <div class="data-table" id="solves-table">
        <div class="empty"><i class="fas fa-spinner spin"></i></div>
      </div>
    </div>

  </div>
</div>

<!-- ADD / EDIT CHALLENGE MODAL -->
<div class="modal-overlay" id="chal-modal">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title" id="chal-modal-title">Add Challenge</div>
      <button class="modal-close" onclick="closeChalModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="form-row">
        <div class="field"><label>Title</label><input class="inp" id="cf-title" placeholder="SQL Injection 101"></div>
        <div class="field"><label>Points</label><input class="inp" type="number" id="cf-pts" placeholder="100"></div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>Category</label>
          <select class="inp" id="cf-cat">
            <option>Web</option><option>Crypto</option><option>Pwn</option>
            <option>Forensics</option><option>Rev</option><option>Misc</option>
          </select>
        </div>
        <div class="field">
          <label>Difficulty</label>
          <select class="inp" id="cf-diff">
            <option>Easy</option><option>Medium</option><option>Hard</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Description</label><textarea class="inp" id="cf-desc" placeholder="What does the player need to do?"></textarea></div>
      <div class="field"><label>Hint</label><input class="inp" id="cf-hint" placeholder="A gentle nudge…"></div>
      <div class="field"><label>Flag (exact string)</label><input class="inp mono" id="cf-flag" placeholder="flag{...}"></div>
      <div class="field"><label>Tags (comma-separated)</label><input class="inp" id="cf-tags" placeholder="sql, injection, auth"></div>
      <div class="field">
        <label>Visible to players</label>
        <select class="inp" id="cf-visible">
          <option value="true">Yes — published</option>
          <option value="false">No — hidden</option>
        </select>
      </div>
      <div style="display:flex;gap:9px;margin-top:4px;">
        <button class="btn btn-accent" onclick="saveChal()"><i class="fas fa-check"></i> Save Challenge</button>
        <button class="btn btn-ghost" onclick="closeChalModal()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- GRANT ROLE MODAL -->
<div class="modal-overlay" id="role-modal">
  <div class="modal" style="width:380px;">
    <div class="modal-hd">
      <div class="modal-title">Change Role</div>
      <button class="modal-close" onclick="closeRoleModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <p style="font-size:.82rem;color:var(--dim2);margin-bottom:14px;">Set role for <strong id="role-uname">—</strong></p>
      <input type="hidden" id="role-uid">
      <div class="field">
        <label>Role</label>
        <select class="inp" id="role-select">
          <option value="player">Player</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div style="display:flex;gap:9px;">
        <button class="btn btn-accent btn-sm" onclick="saveRole()"><i class="fas fa-check"></i> Save</button>
        <button class="btn btn-ghost btn-sm" onclick="closeRoleModal()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { auth, db } from "./js/firebase.js";
import {
  onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  collection, doc, getDocs, getDoc, addDoc, updateDoc, deleteDoc,
  onSnapshot, query, orderBy, limit, serverTimestamp, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const $ = id => document.getElementById(id);
function toast(msg, type = "info") {
  const el = document.createElement("div");
  el.className = `toast ${type}`; el.textContent = msg;
  $("toast-cont").appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

let me = null, myData = null, allChals = [], allUsers = [];

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = "login.html"; return; }
  me = user;
  const snap = await getDoc(doc(db, "users", user.uid));
  myData = snap.data() || {};
  if (myData.role !== "admin") {
    alert("Access denied. Admins only.");
    window.location.href = "dashboard.html";
    return;
  }
  $("admin-av").textContent   = (myData.name || "A")[0].toUpperCase();
  $("admin-name").textContent = myData.name || user.email;
  loadOverview();
  loadChals();
  loadUsers();
  loadSolves();
});

// ── NAVIGATION ───────────────────────────────────────────────
const VIEWS = ["overview","challenges","users","solves"];
window.go = function(v) {
  VIEWS.forEach(x => {
    $("view-"+x).classList.toggle("active", x===v);
    const n = $("nav-"+x); if(n) n.classList.toggle("active", x===v);
  });
  $("page-title").textContent = v[0].toUpperCase()+v.slice(1);
};

// ── OVERVIEW ─────────────────────────────────────────────────
async function loadOverview() {
  const [chalSnap, userSnap, solveSnap, lbSnap] = await Promise.all([
    getDocs(collection(db,"challenges")),
    getDocs(collection(db,"users")),
    getDocs(collection(db,"solves")),
    getDocs(query(collection(db,"leaderboard"),orderBy("score","desc"),limit(1)))
  ]);
  $("ov-chals").textContent   = chalSnap.size;
  $("ov-players").textContent = userSnap.size;
  $("ov-solves").textContent  = solveSnap.size;
  let topScore = 0;
  lbSnap.forEach(d => { topScore = d.data().score || 0; });
  $("ov-top").textContent = topScore.toLocaleString();

  // Recent activity
  const q = query(collection(db,"solves"), orderBy("ts","desc"), limit(15));
  onSnapshot(q, snap => {
    const rows = [];
    snap.forEach(d => rows.push(d.data()));
    const tbl = $("ov-activity");
    if (!rows.length) { tbl.innerHTML = `<div class="empty"><i class="fas fa-inbox"></i><p>No activity yet.</p></div>`; return; }
    tbl.innerHTML = `
      <div class="dt-row dt-head" style="grid-template-columns:1fr 120px 80px 120px;">
        <span>Player</span><span>Challenge</span><span>Points</span><span>Time</span>
      </div>` +
      rows.map(r => `
      <div class="dt-row" style="grid-template-columns:1fr 120px 80px 120px;">
        <span style="font-size:.84rem;font-weight:600;">${r.name || "?"}</span>
        <span style="font-size:.78rem;color:var(--dim2);">${r.title || "?"}</span>
        <span style="font-family:'DM Mono',monospace;font-size:.82rem;color:var(--accent);">+${r.pts}</span>
        <span style="font-size:.72rem;color:var(--dim);">${r.ts?.toDate ? r.ts.toDate().toLocaleString("en-IN",{hour12:false,month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}) : "—"}</span>
      </div>`).join("");
  });
}

// ── CHALLENGES ───────────────────────────────────────────────
async function loadChals() {
  const snap = await getDocs(collection(db,"challenges"));
  allChals = [];
  snap.forEach(d => allChals.push({ id:d.id, ...d.data() }));
  renderChalTable();
}

function renderChalTable() {
  const tbl = $("chal-table");
  if (!allChals.length) { tbl.innerHTML = `<div class="empty"><i class="fas fa-layer-group"></i><p>No challenges. Add one!</p></div>`; return; }
  tbl.innerHTML = `
    <div class="dt-row dt-head" style="grid-template-columns:1fr 80px 80px 60px 70px 70px 100px;">
      <span>Title</span><span>Category</span><span>Difficulty</span><span>Pts</span><span>Solves</span><span>Visible</span><span>Actions</span>
    </div>` +
    allChals.map(c => `
    <div class="dt-row" style="grid-template-columns:1fr 80px 80px 60px 70px 70px 100px;">
      <span style="font-size:.84rem;font-weight:600;">${c.title}</span>
      <span class="cat-badge" style="font-size:.6rem;">${c.category}</span>
      <span class="diff-badge diff-${c.difficulty}">${c.difficulty}</span>
      <span style="font-family:'DM Mono',monospace;font-size:.82rem;color:var(--accent);">${c.points}</span>
      <span style="font-size:.8rem;color:var(--dim2);">${c.solves||0}</span>
      <span class="pill ${c.visible!==false?'pill-on':'pill-off'}">${c.visible!==false?"On":"Off"}</span>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-ghost btn-sm" onclick="editChal('${c.id}')"><i class="fas fa-edit"></i></button>
        <button class="btn btn-danger btn-sm" onclick="delChal('${c.id}')"><i class="fas fa-trash"></i></button>
      </div>
    </div>`).join("");
}

window.openAddChal = function() {
  $("edit-id").value = "";
  $("chal-modal-title").textContent = "Add Challenge";
  ["cf-title","cf-pts","cf-desc","cf-hint","cf-flag","cf-tags"].forEach(id => $(id).value = "");
  $("cf-cat").value = "Web"; $("cf-diff").value = "Easy"; $("cf-visible").value = "true";
  $("chal-modal").classList.add("open");
};
window.editChal = function(id) {
  const c = allChals.find(x => x.id === id);
  if (!c) return;
  $("edit-id").value  = id;
  $("chal-modal-title").textContent = "Edit Challenge";
  $("cf-title").value   = c.title || "";
  $("cf-pts").value     = c.points || 100;
  $("cf-cat").value     = c.category || "Web";
  $("cf-diff").value    = c.difficulty || "Easy";
  $("cf-desc").value    = c.description || "";
  $("cf-hint").value    = c.hint || "";
  $("cf-flag").value    = c.flag || "";
  $("cf-tags").value    = (c.tags || []).join(", ");
  $("cf-visible").value = c.visible !== false ? "true" : "false";
  $("chal-modal").classList.add("open");
};
window.closeChalModal = () => $("chal-modal").classList.remove("open");

window.saveChal = async function() {
  const editId = $("edit-id").value;
  const data = {
    title:       $("cf-title").value.trim(),
    points:      parseInt($("cf-pts").value) || 100,
    category:    $("cf-cat").value,
    difficulty:  $("cf-diff").value,
    description: $("cf-desc").value.trim(),
    hint:        $("cf-hint").value.trim(),
    flag:        $("cf-flag").value.trim(),
    tags:        $("cf-tags").value.split(",").map(t=>t.trim()).filter(Boolean),
    visible:     $("cf-visible").value === "true",
    updatedAt:   serverTimestamp()
  };
  if (!data.title || !data.flag) { toast("Title and flag are required.", "err"); return; }
  try {
    if (editId) {
      await updateDoc(doc(db,"challenges",editId), data);
      toast("Challenge updated.", "ok");
    } else {
      data.createdAt = serverTimestamp();
      data.solves = 0;
      await addDoc(collection(db,"challenges"), data);
      toast("Challenge created.", "ok");
    }
    closeChalModal();
    loadChals();
  } catch(e) { toast("Error: "+e.message, "err"); }
};

window.delChal = async function(id) {
  if (!confirm("Delete this challenge permanently?")) return;
  await deleteDoc(doc(db,"challenges",id));
  toast("Challenge deleted.", "info");
  loadChals();
};

// ── USERS ────────────────────────────────────────────────────
async function loadUsers() {
  const snap = await getDocs(collection(db,"users"));
  allUsers = [];
  snap.forEach(d => allUsers.push({ id:d.id, ...d.data() }));
  allUsers.sort((a,b)=>(b.score||0)-(a.score||0));
  renderUserTable();
}

function renderUserTable() {
  const tbl = $("users-table");
  if (!allUsers.length) { tbl.innerHTML = `<div class="empty"><i class="fas fa-users"></i><p>No users.</p></div>`; return; }
  tbl.innerHTML = `
    <div class="dt-row dt-head" style="grid-template-columns:1fr 160px 60px 60px 70px 110px;">
      <span>Name / Email</span><span>UID</span><span>Solves</span><span>Score</span><span>Role</span><span>Actions</span>
    </div>` +
    allUsers.map(u => `
    <div class="dt-row" style="grid-template-columns:1fr 160px 60px 60px 70px 110px;">
      <div>
        <div style="font-size:.84rem;font-weight:600;">${u.name||"?"}</div>
        <div style="font-size:.7rem;color:var(--dim2);">${u.email||""}</div>
      </div>
      <span style="font-family:'DM Mono',monospace;font-size:.7rem;color:var(--dim2);">${u.uid?.substring(0,10)||u.id?.substring(0,10)}…</span>
      <span style="font-size:.82rem;">${u.solves||0}</span>
      <span style="font-family:'DM Mono',monospace;font-size:.82rem;color:var(--accent);">${(u.score||0).toLocaleString()}</span>
      <span class="pill ${u.role==='admin'?'pill-on':'pill-off'}">${u.role||"player"}</span>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-ghost btn-sm" onclick="openRoleModal('${u.id||u.uid}','${u.name||""}','${u.role||"player"}')" title="Change role"><i class="fas fa-user-shield"></i></button>
        <button class="btn btn-ghost btn-sm" onclick="resetScore('${u.id||u.uid}')" title="Reset score"><i class="fas fa-undo"></i></button>
      </div>
    </div>`).join("");
}

window.resetScore = async function(uid) {
  if (!confirm("Reset this player's score to 0?")) return;
  await updateDoc(doc(db,"users",uid), { score:0, solves:0, solvedIds:[] });
  await updateDoc(doc(db,"leaderboard",uid), { score:0, solves:0 }).catch(()=>{});
  toast("Score reset.", "info");
  loadUsers();
};

window.openRoleModal = function(uid, name, role) {
  $("role-uid").value  = uid;
  $("role-uname").textContent = name || uid;
  $("role-select").value = role;
  $("role-modal").classList.add("open");
};
window.closeRoleModal = () => $("role-modal").classList.remove("open");
window.saveRole = async function() {
  const uid  = $("role-uid").value;
  const role = $("role-select").value;
  await updateDoc(doc(db,"users",uid), { role });
  toast("Role updated to " + role + ".", "ok");
  closeRoleModal();
  loadUsers();
};

// ── SOLVES ───────────────────────────────────────────────────
async function loadSolves() {
  const q = query(collection(db,"solves"), orderBy("ts","desc"), limit(100));
  onSnapshot(q, snap => {
    const rows = []; snap.forEach(d => rows.push(d.data()));
    const tbl = $("solves-table");
    if (!rows.length) { tbl.innerHTML = `<div class="empty"><i class="fas fa-flag"></i><p>No solves yet.</p></div>`; return; }
    tbl.innerHTML = `
      <div class="dt-row dt-head" style="grid-template-columns:1fr 1fr 70px 100px;">
        <span>Player</span><span>Challenge</span><span>Points</span><span>Time</span>
      </div>` +
      rows.map(r => `
      <div class="dt-row" style="grid-template-columns:1fr 1fr 70px 100px;">
        <span style="font-size:.84rem;font-weight:600;">${r.name||"?"}</span>
        <span style="font-size:.8rem;color:var(--dim2);">${r.title||r.challengeId||"?"}</span>
        <span style="font-family:'DM Mono',monospace;font-size:.82rem;color:var(--accent);">+${r.pts}</span>
        <span style="font-size:.7rem;color:var(--dim);">${r.ts?.toDate ? r.ts.toDate().toLocaleString("en-IN",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit",hour12:false}) : "—"}</span>
      </div>`).join("");
  });
}

window.doLogout = async function() {
  await signOut(auth);
  window.location.href = "login.html";
};

document.addEventListener("keydown", e => { if(e.key==="Escape"){ closeChalModal(); closeRoleModal(); } });
</script>
</body>
</html>
